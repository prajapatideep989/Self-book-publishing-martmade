<html>
<head>
    <title>Login account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color: #a7a2a294;
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            min-height: 100vh;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .container{
            width: 480px;
            min-height: 60%;
            background-color: #5b5a5812;
            border-radius: 20px;
        }
        .container .login{
            margin-top: 19%;
        }
        .container .login h1{
            font-size: 56px;
            color: black;
            font-weight: bolder;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .login input{
            margin-top: 5%;
            justify-content: space-between;
            margin: 15px 0;
            width: 70%;
            border-radius: 10px;     
            color: black;
        }
        
        .login button{
            margin-top: 10px;
            width: 60%;
            border-radius: 10px;
            background-color:  #e0dede;  
        }
        .login a{
            color: black;
        }
        .login p{
            margin-top: 7%;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    <form action="login.php" method="POST">
    <div class="container">
        <div class="login">
            <h1>LOGIN</h1>
            <input type="email" placeholder="Email id" id="email" name="email"><br><br>
            <input type="password" id="password" placeholder="Password" name="password"><br>
            <button type="submit" id="submit">Login</button>
            <p>If you not register.? then you can <a href="Register.html">Register</a></p>
        </div>
    </div>
    </form>
    <script src="jquery.js"></script>
    <script>
        $(document).ready(function(){
            $("#submit").click(function(){
                var a = document.getElementById("email").value;
                var b = document.getElementById("password").value;  
                if(a=="" || b==""){
                    alert("All fields are required..");
                    return false;         
                }
                
                else{
                    confirm("Login Successfully Mr "+a);
                    return true;     
                }
           		 });
 	 });
</script>
</body>
</html>
