<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color: #a7a2a294;
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            min-height: 100vh;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .container{
            width: 480px;
            min-height: 200%;
            background-color: #5b5a5812;
            background-position: center;
            background-size: cover;
            border-radius: 20px;
        }
        .register h1{
            font-weight: bolder;
            color: black;
            font-size: 55px;
        }

        .register input{
            margin-top: 10%;
            justify-content: space-between;
            margin: 15px 0;
            width: 70%;
            height: 30px;
            border-radius: 10px;        
        }
        .register textarea{
            width: 70%;
            height: auto;
            border-radius: 10px;
            border: black;
        }
       .register button{
            margin-top: 10px;
            width: 60%;
            border-radius: 10px;
        }
        .register p{
            margin-top: 10px;
            color: black;
            font-size: 19px;
        }
        .register a{
            color: black;
        }
    </style>
</head>
<body>
    <form action="register.php" method="POST">
    <div class="container">
        <div class="register">
            <h1>Register</h1>
            <input type="text" placeholder="Name" id="name" name="name"><br>
            <input type="email" placeholder="Email id" id="email" name="email"><br>
            <input type="text" id="phone" placeholder="Phone Number" name="phone"><br>
            <textarea id="Address" name="address" rows="4" cols="50" placeholder="Address"></textarea>
            <input type="password" id="password" placeholder="Password" name="password"><br>
            <button type="submit" id="submit">Submit</button>
            <p>If already login <a href="Login_Register.html">Login</a></p>
        </div>
    </div>
    </form>
    <script src="jquery.js"></script>
    <script>
        $(document).ready(function(){
            $("#submit").click(function(){
                var a = document.getElementById("email").value;
                var b = document.getElementById("password").value;
                var c = document.getElementById("phone").value;
                var d = document.getElementById("name").value;
                var e = document.getElementById("Address").value;
                
                if(a=="" || b==""){
                    alert("All filed are required..");
                    return false;
                }
                else if(b.length!=6){
                    alert("Password must be 6 length..");
                    return false;
                }
                else if(c.length!=10){
                    alert("Phone Number must be 10 character");
                    return false;
                }
                else if(isNaN(c)){
                    alert("Only Number use in Phone Number");
                    return false;
                } else{
                    confirm("Register Successfully");
                   return true;

                }
            });
        });
</script>
</body>
</html>
